name: Build and Push Docker Image

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/<your_lowercase_username>/k8s-custom-nginx

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3       # Authenticate to GHCR
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6   # Build for AMD64 + ARM64 and push
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:latest